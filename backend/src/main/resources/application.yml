server:
  port: 8080
  # 监听所有网卡，手机/局域网用本机 IPv4 访问；仅 127.0.0.1 时外网卡访问会 connection refused
  address: 0.0.0.0
  servlet:
    context-path: /api

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:gym_system}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:123456}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
  rabbitmq:
    host: ${RABBIT_HOST:localhost}
    port: ${RABBIT_PORT:5672}
    username: ${RABBIT_USERNAME:guest}
    password: ${RABBIT_PASSWORD:guest}

app:
  jwt-secret: gym-membership-system-secret-key-2026
  redis-enabled: false
  rabbitmq-enabled: false
  # 启动时若库中不存在演示标记会员(手机19988880001)，则自动写入一批示例数据；正式环境请改为 false
  demo-seed: true
  # 小程序 code2session（留空则仅支持手机号绑定登录）
  wx-miniapp:
    app-id: ${WX_MINIAPP_APPID:}
    app-secret: ${WX_MINIAPP_SECRET:}
